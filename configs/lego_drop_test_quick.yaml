coordinate_mapping:
  world_center:
  - 0.5
  - 0.5
  - 0.5
  world_scale: 1.0
damage_projection:
  damage_threshold: 0.01
  influence_radius: 0.05
  k_neighbors: 8
  method: knn_weighted
  use_faiss: true
device:
  gpu_id: 0
  type: cuda
external_force:
  enabled: false
gaussian_splatting:
  color_mode: overlay
  crack_color:
  - 0.6
  - 0.08
  - 0.08
  crack_edge_darken: 0.75
  crack_gap_fraction: 0.35
  crack_max_opening: 0.01
  crack_opacity_reduction: 0.7
  crack_red_accent: 0.1
  damage_threshold: 0.45
  edge_width: 0.02
  interior_color:
  - 0.28
  - 0.28
  - 0.28
  opacity_mode: smooth
  ply_direct: true
  ply_remove_floor: false
  pretrained_ply: assets/trained/lego/point_cloud.ply
  pretrained_scale_multiplier: 1.0
  scale_mode: null
  sh_degree: 3
  sharp_k: 50.0
ground_plane:
  enabled: true
  friction: 0.5
  normal:
  - 0.0
  - 0.0
  - 1.0
  point:
  - 0.5
  - 0.5
  - 0.05
  surface_type: slip
loading:
  drop_center_z: 1.0
  drop_rotation:
  - 30.0
  - 0.0
  - 15.0
  drop_scale: 0.33
  type: gravity_drop
material:
  Gc: 40000.0
  center:
  - 0.5
  - 0.5
  - 0.5
  constitutive_model: corotated_phase_field
  degradation_exponent: 3.0
  density: 1200.0
  l0: 0.025
  poissons_ratio: 0.25
  preset: null
  size:
  - 0.8
  - 0.8
  - 0.8
  youngs_modulus: 1.0e7
mesh:
  auto_generate_if_missing: false
  path: assets/meshes/lego.obj
mpm:
  clip_bound: 0.05
  damping: 0.9995
  dt: 0.0001
  gravity:
  - 0.0
  - 0.0
  - -1000.0
  num_grids: 128
  particle_chunk: 8192
output:
  checkpoint_dir: output/checkpoints
  frame_dir: output/frames
  log_interval: 50
  statistics_log: output/statistics.csv
  verbose: true
  video_path: output/lego_drop_shatter.mp4
particles:
  normalize_to_unit_cube: true
  poisson_depth: 8
  surface_ratio: 0.7
  target_count: 300000
  use_poisson_sampling: false
phase_field:
  branch_angle: 55.0
  branch_min_length: 2
  branch_probability: 0.75
  crack_aniso_ratio: 200.0
  crack_tip_speed: 30.0
  crack_width: 0.004
  dC_max: 0.25
  fragment_damage_threshold: 0.35
  fragmentation_enabled: true
  max_branches_per_path: 5
  max_nucleation_per_frame: 3
  max_total_cracks: 96
  min_fragment_particles: 30
  nucleation_fraction: 0.35
  nucleation_min_spacing: 10
  warmup_frames: 1
pre_notch:
  enabled: false
rendering:
  background_color:
  - 1.0
  - 1.0
  - 1.0
  camera:
    azimuth: -30.0
    distance: 1.0
    elevation: 10.0
    fov: 50.0
    target:
    - 0.50
    - 0.50
    - 0.35
  fps: 30
  image_height: 1920
  image_width: 1920
  physics_substeps: 15
  total_frames: 150
seismic:
  amplitude: 3500.0
  direction:
  - 1.0
  - 0.3
  - 0.0
  enabled: true
  frequency: 80.0
  ramp_time: 0.005
simulation:
  description: "Lego drops onto ground plane \u2014 brittle fracture with pretrained\
    \ 3DGS"
  mode: deformation
  name: lego_drop_showcase
  output_dir: output
  save_checkpoint: false
  save_frames: true
